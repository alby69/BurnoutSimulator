name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nicegui>=1.4.0 pytest ruff

    - name: Lint with Ruff
      run: ruff check . --ignore=E501,F401,E402

    - name: Run unit tests
      run: PYTHONPATH=. python -m pytest tests/ -v --tb=short

    - name: Run integration verification
      run: PYTHONPATH=. python tests/verify_v3_1.py
